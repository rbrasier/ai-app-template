name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── framework packages → GitHub Package Registry (@rbrasier/*) ─────────────
  release:
    name: Publish framework packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@rbrasier"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "chore: release packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── create CLI → public npm (create-ai-app-template) ───────────────────────
  release-create-cli:
    name: Publish create CLI to npm
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build create CLI
        run: pnpm --filter create-ai-app-template build

      - name: Publish create-ai-app-template
        run: |
          cd packages/create
          # Only publish if this version isn't already on npm
          CURRENT=$(node -e "process.stdout.write(require('./package.json').version)")
          PUBLISHED=$(npm view create-ai-app-template version 2>/dev/null || echo "none")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            npm publish --access public
          else
            echo "create-ai-app-template@$CURRENT already published — skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
